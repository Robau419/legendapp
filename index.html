<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Légendage</title>
</head>
<body>
  <div class="container">
        <div class="legend-make">
            <div class="default-legend">
                <h1>Application de légendage photo</h1>
              <div class="style-select">  
         <label>
            <input type="radio" name="type" value="reportage" checked>
            Reportage
        </label>
        <label>
            <input type="radio" name="type" value="sport" id="sportRadio">
            Sport
        </label>
              </div>
            <div id="select-sport-block">
                <fieldset>
                    <legend>Sport</legend>
                  <label for="second-team">Nom de l'équipe adverse :</label>
                  <input type="text" name="secondTeam" id="second-team" placeholder="Equipe 2 (adverse)"/>
                  <br>
                  <label>Equipe 1 :</label>
                  <button id="foot-myf">Football MYF</button>
                  <button id="rugby">Rugby FCM</button>
                  <button id="waterpolo">Waterpolo NCM</button>
                  <button id="foot-ac">Football académie</button>
                </fieldset>
                <br>
            </div>
                <div class="block-title">
                    <label for="title">Titre :</label>
                    <br>
                    <input type="text" name="title" rows="4" cols="50" id="title" placeholder="Ecrire le titre de la légende" tabindex="1"/>
                    <button id="addToDescription">↓</button>
                    <br>
                </div>
                <div class="block-description">
                    <label for="description">Description :</label>
                    <br>
                    <textarea id="description" name="description" rows="4" cols="50" placeholder="Description" tabindex="2"></textarea>
                </div>
                <div class="block-city">
                    <label for="city">Sélectionnez le lieu du reportage :</label>
                    <br>
                    <input type="text" id="city" list="city-list" name="city-list" value="" size="22" tabindex="3">
                    <datalist id="city-list">
                        <option value="Moulins"></option>
                        <option value="Toulon-sur-Allier"></option>
                        <option value="Avermes"></option>
                        <option value="Yzeure"></option>
                        <option value="Neuvy"></option>
                        <option value="Saint-Pourcain-sur-Sioule"></option>
                        <option value="Souvigny"></option>
                        <option value="Saint-Pourcain-sur-Besbre"></option>
                    </datalist>
                    <button id="citySuppr">Effacer</button>
                    <br>
                    <button id="cityMoulins" title="alt+m" accesskey="m">Moulins</button>
                    <button id="cityYzeure" title="alt+y" accesskey="y">Yzeure</button>
                    <button id="citySaintPourcainSioule">Saint P/Sioule</button>
                    <button id="citySaintPourcainBesbre">Saint P/Besbre</button>
                </div>
                <div class="block-photo">
                    <label for="photographer">Photographe :</label>
                    <input type="text" id="photographer" name="nom" value="Photographe">
                </div>
                <div class="key-words">
                    <label for="textkeywords">Mots-clés :</label>
                    <br>
                    <textarea id="textkeywords" name="textkeywords" rows="4" cols="55" placeholder="Mots-clés espacés d'une virgule" tabindex="4"></textarea>
                </div>
                <div class="block-date">
                    <label for="dateInput">Date du reportage :</label>
                    <br>
                    <input id="dateInput" type="date" tabindex="5"/>
                    <input type="radio" id="today" name="today" value="today" checked />
                    <label for="today">Aujourd'hui</label>
                </div>
                <button onclick="generateLegend()" tabindex="6" accesskey="g" title="alt+g">Générer la légende</button>
              <br>
                <button id="deleteAll">Réinitialiser</button>
            </div>    
        </div>
        <div id="legend">
            <p id='titleDisplay'></p>
            <p id='legendTxt'></p>
            <button id='copyTitle'>Copier le titre</button>
            <button id="copyLegend">Copier la légende</button>
        </div>
  </div>
    
    <script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" />
    <title>Légendage</title>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-logo">&#128247;</div>
      <div class="header-text">
        <h1>Légendage Photo</h1>
        <p class="header-subtitle">Générez vos légendes standardisées</p>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- Panneau formulaire -->
      <div class="legend-make">
        <div class="default-legend">

          <!-- Type de reportage -->
          <div class="form-section">
            <div class="style-select">
              <label class="radio-pill">
                <input type="radio" name="type" value="reportage" checked>
                <span>Reportage</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="type" value="sport" id="sportRadio">
                <span>Sport</span>
              </label>
            </div>
          </div>

          <!-- Bloc sport -->
          <div id="select-sport-block">
            <fieldset class="sport-fieldset">
              <legend>Informations sportives</legend>
              <div class="form-group">
                <label for="second-team">Équipe adverse</label>
                <input type="text" name="secondTeam" id="second-team" placeholder="Nom de l'équipe adverse" />
              </div>
              <div class="sport-btns">
                <button id="foot-myf" class="btn-sport">Football MYF</button>
                <button id="rugby" class="btn-sport">Rugby FCM</button>
                <button id="waterpolo" class="btn-sport">Waterpolo NCM</button>
                <button id="foot-ac" class="btn-sport">Football Acad.</button>
              </div>
            </fieldset>
          </div>

          <!-- Titre -->
          <div class="form-group">
            <label for="title">Titre</label>
            <div class="input-row">
              <input type="text" name="title" id="title" placeholder="Titre de la légende" tabindex="1" />
              <button id="addToDescription" class="btn-icon" title="Insérer dans la description">&#8595;</button>
            </div>
          </div>

          <!-- Description -->
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="Description de la photo" tabindex="2"></textarea>
          </div>

          <!-- Ville -->
          <div class="form-group">
            <label for="city">Lieu du reportage</label>
            <div class="input-row">
              <input type="text" id="city" list="city-list" name="city-list" value="" tabindex="3" placeholder="Saisir ou choisir une ville">
              <datalist id="city-list">
                <option value="Avermes"></option>
                <option value="Moulins"></option>
                <option value="Neuvy"></option>
                <option value="Saint-Pourcain-sur-Besbre"></option>
                <option value="Saint-Pourcain-sur-Sioule"></option>
                <option value="Souvigny"></option>
                <option value="Toulon-sur-Allier"></option>
                <option value="Yzeure"></option>
              </datalist>
              <button id="citySuppr" class="btn-icon btn-clear" title="Effacer la ville">&#10005;</button>
            </div>
            <!-- Requis par script.js pour la fonction filterCities -->
            <input type="text" id="searchCity" style="display:none" aria-hidden="true" />
            <div class="city-chips">
              <button id="cityMoulins" class="btn-chip" title="Raccourci: alt+m" accesskey="m">Moulins</button>
              <button id="cityYzeure" class="btn-chip" title="Raccourci: alt+y" accesskey="y">Yzeure</button>
              <button id="citySaintPourcainSioule" class="btn-chip">St-P/Sioule</button>
              <button id="citySaintPourcainBesbre" class="btn-chip">St-P/Besbre</button>
            </div>
          </div>

          <!-- Photographe -->
          <div class="form-group">
            <label for="photographer">Photographe</label>
            <input type="text" id="photographer" name="nom" value="Photographe" />
          </div>

          <!-- Mots-clés -->
          <div class="form-group">
            <label for="textkeywords">Mots-clés</label>
            <textarea id="textkeywords" name="textkeywords" rows="3" placeholder="Mots-clés séparés par des virgules" tabindex="4"></textarea>
          </div>

          <!-- Date -->
          <div class="form-group">
            <label for="dateInput">Date du reportage</label>
            <div class="date-row">
              <input id="dateInput" type="date" tabindex="5" />
              <label class="radio-pill compact">
                <input type="radio" id="today" name="today" value="today" checked />
                <span>Aujourd'hui</span>
              </label>
            </div>
          </div>

          <!-- Boutons d'action -->
          <div class="form-actions">
            <button onclick="generateLegend(true)" class="btn-primary" tabindex="6" accesskey="g" title="Raccourci: alt+g">
              Générer la légende
            </button>
            <button id="deleteAll" class="btn-reset">Réinitialiser</button>
          </div>

        </div>
      </div>

      <!-- Panneau aperçu -->
      <div id="legend">
        <div class="preview-header">
          <span class="preview-badge">Aperçu</span>
        </div>

        <div class="preview-block">
          <span class="preview-label">Titre</span>
          <p id="titleDisplay" class="preview-text"></p>
          <button id="copyTitle" class="btn-copy">Copier le titre</button>
        </div>

        <hr class="preview-divider" />

        <div class="preview-block">
          <span class="preview-label">Légende</span>
          <p id="legendTxt" class="preview-text"></p>
          <button id="copyLegend" class="btn-copy">Copier la légende</button>
        </div>
      </div>

    </div>

    <!-- Historique des générations -->
    <section class="history-section">
      <div class="history-header">
        <div class="history-title-row">
          <h2>Historique</h2>
          <span class="history-count-badge" id="history-count">0</span>
        </div>
        <button id="clear-history" class="btn-clear-history">Tout effacer</button>
      </div>
      <p id="history-empty" class="history-empty">Aucune légende générée pour l'instant.<br>Cliquez sur <strong>Générer la légende</strong> pour commencer.</p>
      <div id="history-list" class="history-list"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
